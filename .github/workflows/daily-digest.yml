name: Daily Digest

on:
  schedule:
    # 07:00 UTC every day
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      category:
        description: "Which workflow to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - tech
          - politics

jobs:
  tech-news:
    name: Tech News
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.category == 'both' || inputs.category == 'tech' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install Jazz
        run: bun install -g jazz-ai

      - name: Capture pre-run credit balance
        id: credits_before
        run: |
          USAGE=$(curl -s https://openrouter.ai/api/v1/auth/key \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            | jq -r '.data.usage // 0')
          echo "usage=$USAGE" >> $GITHUB_OUTPUT
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run tech-news workflow
        run: jazz --config ./jazz.config.json --output raw workflow run tech-news --auto-approve
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CI: "true"
          JAZZ_DISABLE_CATCH_UP: "1"

      - name: Write job summary
        if: always()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OUTPUT_FILE="output/tech-news-${DATE}.json"

          # Article count
          if [ -f "$OUTPUT_FILE" ]; then
            COUNT=$(jq 'length' "$OUTPUT_FILE")
          else
            COUNT=0
          fi

          # Cost delta
          USAGE_AFTER=$(curl -s https://openrouter.ai/api/v1/auth/key \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            | jq -r '.data.usage // 0')
          COST=$(echo "$USAGE_AFTER - ${{ steps.credits_before.outputs.usage }}" | bc -l)
          COST_FMT=$(printf '%.4f' $COST)

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Tech News — ${DATE}

          | | |
          |---|---|
          | Articles inserted | ${COUNT} |
          | Run cost | \$${COST_FMT} |
          EOF
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  political-news:
    name: Political News
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.category == 'both' || inputs.category == 'politics' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install Jazz
        run: bun install -g jazz-ai

      - name: Capture pre-run credit balance
        id: credits_before
        run: |
          USAGE=$(curl -s https://openrouter.ai/api/v1/auth/key \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            | jq -r '.data.usage // 0')
          echo "usage=$USAGE" >> $GITHUB_OUTPUT
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run political-news workflow
        run: jazz --config ./jazz.config.json --output raw workflow run political-news --auto-approve
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CI: "true"
          JAZZ_DISABLE_CATCH_UP: "1"

      - name: Write job summary
        if: always()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OUTPUT_FILE="output/political-news-${DATE}.json"

          # Article count
          if [ -f "$OUTPUT_FILE" ]; then
            COUNT=$(jq 'length' "$OUTPUT_FILE")
          else
            COUNT=0
          fi

          # Cost delta
          USAGE_AFTER=$(curl -s https://openrouter.ai/api/v1/auth/key \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            | jq -r '.data.usage // 0')
          COST=$(echo "$USAGE_AFTER - ${{ steps.credits_before.outputs.usage }}" | bc -l)
          COST_FMT=$(printf '%.4f' $COST)

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Political News — ${DATE}

          | | |
          |---|---|
          | Articles inserted | ${COUNT} |
          | Run cost | \$${COST_FMT} |
          EOF
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
