name: Daily Digest

on:
  schedule:
    # 07:00 UTC every day
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      category:
        description: "Which workflow to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - tech
          - politics

jobs:
  tech-news:
    name: Tech News
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.category == 'both' || inputs.category == 'tech' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install Jazz
        run: bun install -g jazz-ai

      - name: Configure Jazz agent
        run: |
          mkdir -p ~/.jazz/agents
          echo '{"id":"default","name":"default","description":"Dollar Digest research agent","model":"openrouter/deepseek/deepseek-v4-flash","config":{"persona":"default","llmProvider":"openrouter","llmModel":"deepseek/deepseek-v4-flash"},"createdAt":"2026-01-01T00:00:00.000Z","updatedAt":"2026-01-01T00:00:00.000Z"}' > ~/.jazz/agents/default.json

      - name: Run tech-news workflow
        run: jazz --output raw workflow run tech-news --auto-approve
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CI: "true"
          JAZZ_DISABLE_CATCH_UP: "1"

  political-news:
    name: Political News
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || inputs.category == 'both' || inputs.category == 'politics' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install Jazz
        run: bun install -g jazz-ai

      - name: Configure Jazz agent
        run: |
          mkdir -p ~/.jazz/agents
          echo '{"id":"default","name":"default","description":"Dollar Digest research agent","model":"openrouter/deepseek/deepseek-v4-flash","config":{"persona":"default","llmProvider":"openrouter","llmModel":"deepseek/deepseek-v4-flash"},"createdAt":"2026-01-01T00:00:00.000Z","updatedAt":"2026-01-01T00:00:00.000Z"}' > ~/.jazz/agents/default.json

      - name: Run political-news workflow
        run: jazz --output raw workflow run political-news --auto-approve
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CI: "true"
          JAZZ_DISABLE_CATCH_UP: "1"
