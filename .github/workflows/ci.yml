name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check schema migrations are up to date
        run: |
          bun run db:generate
          if ! git diff --exit-code drizzle/ || git ls-files --others --exclude-standard drizzle/ | grep -q .; then
            echo "::error::Schema out of sync — run 'bun run db:generate' locally and commit the migration files."
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
